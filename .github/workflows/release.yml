name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Windows (x86_64) ─────────────────────────────────────────────────
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --profile release -p relay_gallery

      - name: Prepare dist directory
        shell: bash
        run: |
          mkdir -p dist/windows/x86_64
          cp target/release/relay_gallery.exe dist/windows/x86_64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay_gallery-windows-x86_64
          path: dist/windows/x86_64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/x86_64/relay_gallery.exe
          generate_release_notes: true

