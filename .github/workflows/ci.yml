name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ── Format ────────────────────────────────────────────────────────────
  # No compilation needed — fastest check, no cache action.
  fmt:
    name: Format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --check --all

  # ── Clippy ───────────────────────────────────────────────────────────
  # Lints with warnings denied. Uses the `ci` profile (no incremental).
  clippy:
    name: Clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --profile ci --workspace -- -D warnings
        env:
          RUSTFLAGS: "-D warnings"

  # ── Check + Test ─────────────────────────────────────────────────────
  # Combined into one job so `check` and `test` share a single compilation
  # of gpui and other heavy dependencies.
  check-and-test:
    name: Check + Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --profile ci --workspace
        env:
          RUSTFLAGS: "-D warnings"
      - run: cargo test --profile ci --workspace
        env:
          RUSTFLAGS: "-D warnings"
